services:
  # ─── Infrastructure ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ars_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ars_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ars_password}
      POSTGRES_DB: ${POSTGRES_DB:-ars_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ars_user -d ars_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ars_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ars_minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minio}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minio123456}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/live || exit 1']
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: ars_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minio}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minio123456}
      - MINIO_BUCKET=${MINIO_BUCKET:-ars-resumes}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
      mc mb --ignore-existing local/$$MINIO_BUCKET &&
      mc anonymous set download local/$$MINIO_BUCKET &&
      echo 'MinIO bucket ready'
      "
    restart: "no"

  # ─── Microservices ────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./apps/auth-service
      dockerfile: Dockerfile
    container_name: ars_auth
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://ars_user:ars_password@postgres:5432/ars_db
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/v1/health || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  job-service:
    build:
      context: ./apps/job-service
      dockerfile: Dockerfile
    container_name: ars_job
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=postgresql://ars_user:ars_password@postgres:5432/ars_db
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY:-minio}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY:-minio123456}
      - AWS_S3_BUCKET=${MINIO_BUCKET:-ars-resumes}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - '3002:3002'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3002/api/v1/health || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  ai-screener-service:
    build:
      context: ./apps/ai-screener-service
      dockerfile: Dockerfile
    container_name: ars_ai
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_URL=postgresql://ars_user:ars_password@postgres:5432/ars_db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
      - REDIS_URL=redis://redis:6379
      - REDIS_TTL=${REDIS_TTL:-3600}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - '3003:3003'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:3003/api/v1/health")']
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    container_name: ars_gateway
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - JOB_SERVICE_URL=http://job-service:3002
      - AI_SERVICE_URL=http://ai-screener-service:3003
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
      - REDIS_URL=redis://redis:6379
      - THROTTLE_TTL=${THROTTLE_TTL:-60}
      - THROTTLE_LIMIT=${THROTTLE_LIMIT:-10}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - '3000:3000'
    depends_on:
      auth-service:
        condition: service_healthy
      job-service:
        condition: service_healthy
      ai-screener-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 25s
      retries: 3

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: ars_frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api/v1
    ports:
      - '3004:3004'
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
